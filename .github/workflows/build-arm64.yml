name: Build TRI-PI ARM64

on:
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:
    inputs:
      version:
        description: "triangles_v5 tag to build (example: v5.8.1). Leave empty to use latest upstream release."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout tri-pi repo
        uses: actions/checkout@v4
      
      - name: Resolve target triangles version
        id: get-version
        shell: bash
        run: |
          set -euo pipefail

          VERSION=""

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          elif [ -n "${{ github.event.inputs.version || '' }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi

          if [ -z "$VERSION" ]; then
            VERSION=$(curl -fsSL https://api.github.com/repos/SamiAhmed7777/triangles_v5/releases/latest | jq -r .tag_name)
          fi

          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Failed to resolve triangles_v5 release version" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "🔍 Building triangles $VERSION for ARM64"
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build triangles_v5 ARM64
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          echo "Building triangles $VERSION for ARM64..."
          mkdir -p artifacts
          
          docker run --rm --platform linux/arm64 \
            -e VERSION="$VERSION" \
            -v $PWD:/workspace \
            -w /workspace \
            ubuntu:24.04 bash -c '
          set -euo pipefail
          exec > >(tee /workspace/artifacts/build-arm64.log) 2>&1
          
          echo "Building triangles $VERSION for ARM64..."
          
          # Install dependencies
          apt-get update -qq
          apt-get install -y -qq \
            git build-essential cmake libtool autotools-dev automake pkg-config \
            libssl-dev libevent-dev zlib1g-dev bsdmainutils libboost-all-dev \
            libminiupnpc-dev libzmq3-dev curl wget ca-certificates jq autoconf automake liblzma-dev libzstd-dev
          
          # Build BerkeleyDB 4.8
          cd /tmp
          curl -sL -o db-4.8.30.NC.tar.gz http://download.oracle.com/berkeley-db/db-4.8.30.NC.tar.gz
          tar xzf db-4.8.30.NC.tar.gz
          cd db-4.8.30.NC/build_unix
          
          # Update config scripts for ARM64
          curl -sL -o ../dist/config.guess "http://git.savannah.gnu.org/gitweb/?p=config.git;a=blob_plain;f=config.guess;hb=HEAD"
          curl -sL -o ../dist/config.sub "http://git.savannah.gnu.org/gitweb/?p=config.git;a=blob_plain;f=config.sub;hb=HEAD"
          chmod +x ../dist/config.guess ../dist/config.sub
          
          ../dist/configure --enable-cxx --disable-shared --with-pic --prefix=/usr/local
          make -j$(nproc)
          make install
          ldconfig
          
          # Clone and build triangles with embedded Tor enabled
          cd /tmp
          git clone --branch $VERSION --depth 1 https://github.com/SamiAhmed7777/triangles_v5.git
          cd triangles_v5

          if [ ! -d src/tor/tor-src/.git ]; then
            git submodule update --init --recursive src/tor/tor-src || true
          fi

          if [ ! -d src/tor/tor-src ]; then
            echo "Embedded Tor source tree missing at src/tor/tor-src" >&2
            exit 1
          fi

          cd src/tor/tor-src
          echo "=== Building embedded Tor ==="
          export LDFLAGS="-L/usr/lib/aarch64-linux-gnu -L/usr/lib"
          ./autogen.sh
          ./configure \
            --enable-static-tor \
            --disable-module-relay \
            --disable-module-dirauth \
            --disable-asciidoc \
            --disable-manpage \
            --disable-html-manual \
            --disable-unittests \
            --disable-tool-name-check \
            --with-openssl-dir=/usr \
            --with-libevent-dir=/usr \
            --with-zlib-dir=/usr \
            --prefix=/usr/local
          make -j$(nproc)
          find . -maxdepth 2 -name "*.a" -o -name "tor_api.h" | sort | tee /workspace/artifacts/libtor-files.txt

          cd /tmp/triangles_v5
          mkdir build && cd build
          echo "=== CMake configure ==="
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_QT=OFF \
            -DBUILD_DAEMON=ON \
            -DBUILD_TESTS=OFF \
            -DUSE_UPNP=ON \
            -DUSE_TOR_EMBEDDED=ON \
            -DTOR_SOURCE_ROOT=/tmp/triangles_v5/src/tor/tor-src | tee /workspace/artifacts/cmake-configure.log
          
          echo "=== CMake cache ==="
          grep -E "USE_TOR_EMBEDDED|TOR_SOURCE_ROOT|BUILD_DAEMON|BUILD_QT" CMakeCache.txt | tee /workspace/artifacts/cmake-cache-tor.txt
          
          echo "=== Build ==="
          make -j$(nproc)
          strip bin/trianglesd
          
          # Copy to workspace
          mkdir -p /workspace/bin
          cp bin/trianglesd /workspace/bin/
          chmod +x /workspace/bin/trianglesd
          
          echo "Build complete!"
          file /workspace/bin/trianglesd | tee /workspace/artifacts/trianglesd-file.txt
          ldd /workspace/bin/trianglesd | tee /workspace/artifacts/trianglesd-ldd.txt || true
          strings /workspace/bin/trianglesd | grep -i -E "tor_run_main|embedded tor|ENABLE_TOR_EMBEDDED|torrc|hidden service" | sort -u | tee /workspace/artifacts/trianglesd-tor-strings.txt || true
          /workspace/bin/trianglesd --version | tee /workspace/artifacts/trianglesd-version.txt || true
          '
      
      - name: Update VERSION file
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          echo "$VERSION" > VERSION
      
      - name: Create release package
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          PACKAGE_DIR="tri-pi-${VERSION}-arm64"
          
          mkdir -p releases
          tar czf "releases/${PACKAGE_DIR}.tar.gz" \
            bin/ docs/ install.sh README.md VERSION BOOTSTRAP.md
          
          cd releases
          sha256sum "${PACKAGE_DIR}.tar.gz" > "${PACKAGE_DIR}.tar.gz.sha256"
          
          echo "📦 Package created:"
          ls -lh "${PACKAGE_DIR}.tar.gz"*
      
      - name: Commit and push changes
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          
          git config user.name "TRI-PI Builder"
          git config user.email "bot@tri-pi.build"
          
          git add VERSION bin/trianglesd releases/
          git commit -m "Auto-build: TRI-PI ${VERSION} ARM64 release - Native ARM64 binary, GitHub Actions QEMU" || echo "No changes to commit"
          
          git push origin main || echo "Already up to date"
      
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tri-pi-arm64-build-diagnostics-${{ steps.get-version.outputs.version }}
          path: artifacts/
          if-no-files-found: warn

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get-version.outputs.version }}
          name: TRI-PI ${{ steps.get-version.outputs.version }} ARM64
          body: |
            # TRI-PI ${{ steps.get-version.outputs.version }} ARM64
            
            Native ARM64 release built from [triangles_v5 ${{ steps.get-version.outputs.version }}](https://github.com/SamiAhmed7777/triangles_v5/releases/tag/${{ steps.get-version.outputs.version }})
            
            ## Installation
            
            ```bash
            wget https://github.com/SamiAhmed7777/tri-pi/releases/download/${{ steps.get-version.outputs.version }}/tri-pi-${{ steps.get-version.outputs.version }}-arm64.tar.gz
            tar xzf tri-pi-${{ steps.get-version.outputs.version }}-arm64.tar.gz
            cd tri-pi-*/
            sudo ./install.sh
            ```
            
            ## What's Included
            
            - Native ARM64 trianglesd binary
            - One-command installer
            - Tor integration
            - Updated seed nodes
            
            Built for: Raspberry Pi 4/5 (64-bit), ARM64 servers
          files: |
            releases/tri-pi-${{ steps.get-version.outputs.version }}-arm64.tar.gz
            releases/tri-pi-${{ steps.get-version.outputs.version }}-arm64.tar.gz.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
