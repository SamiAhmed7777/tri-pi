name: Build TRI-PI ARM64

on:
  schedule:
    - cron: '0 */6 * * *'

  workflow_dispatch:
    inputs:
      version:
        description: 'Triangles version tag (e.g., v5.4.5). Leave empty to auto-detect.'
        required: false
        default: ''

permissions:
  contents: write
  issues: write

jobs:
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      should_build: ${{ steps.resolve.outputs.should_build }}
    steps:
      - name: Determine version to build
        id: resolve
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"

          if [ -n "$INPUT_VERSION" ]; then
            echo "Manual trigger: $INPUT_VERSION"
            echo "version=$INPUT_VERSION" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Auto-detect: compare upstream vs our latest release
          LATEST=$(curl -s https://api.github.com/repos/SamiAhmed7777/triangles_v5/releases/latest | jq -r .tag_name)
          CURRENT=$(curl -s https://api.github.com/repos/SamiAhmed7777/tri-pi/releases/latest | jq -r .tag_name)

          echo "Upstream latest: $LATEST"
          echo "Our latest: $CURRENT"

          if [ "$LATEST" != "$CURRENT" ] && [ "$LATEST" != "null" ]; then
            echo "New version detected: $LATEST"
            echo "version=$LATEST" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "Already up to date"
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  build-arm64:
    name: Build ARM64 Binary
    needs: resolve-version
    if: needs.resolve-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout tri-pi
        uses: actions/checkout@v4

      - name: Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build trianglesd (ARM64 via QEMU)
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$GITHUB_WORKSPACE:/work" \
            -e VERSION="$VERSION" \
            ubuntu:24.04 bash -exc '
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
                git build-essential libtool autotools-dev automake pkg-config \
                libssl-dev libevent-dev bsdmainutils libboost-all-dev \
                libminiupnpc-dev libzmq3-dev curl ca-certificates

              # BerkeleyDB 4.8
              cd /tmp
              curl -sL -o db-4.8.30.NC.tar.gz \
                http://download.oracle.com/berkeley-db/db-4.8.30.NC.tar.gz
              tar xzf db-4.8.30.NC.tar.gz
              cd db-4.8.30.NC/build_unix

              # Update config scripts for ARM64
              curl -sL -o ../dist/config.guess \
                "http://git.savannah.gnu.org/gitweb/?p=config.git;a=blob_plain;f=config.guess;hb=HEAD"
              curl -sL -o ../dist/config.sub \
                "http://git.savannah.gnu.org/gitweb/?p=config.git;a=blob_plain;f=config.sub;hb=HEAD"
              chmod +x ../dist/config.guess ../dist/config.sub

              ../dist/configure --enable-cxx --disable-shared --with-pic --prefix=/usr/local
              make -j$(nproc)
              make install
              ldconfig

              # Build triangles_v5
              cd /tmp
              git clone -b "$VERSION" --depth 1 \
                https://github.com/SamiAhmed7777/triangles_v5.git
              cd triangles_v5/src
              make -f makefile.unix -j$(nproc) USE_UPNP=1
              strip trianglesd

              file trianglesd
              ls -lh trianglesd

              mkdir -p /work/bin
              cp trianglesd /work/bin/
              chmod +x /work/bin/trianglesd
            '

      - name: Verify binary
        run: file bin/trianglesd

      - name: Create release package
        run: |
          PACKAGE="tri-pi-${VERSION}-arm64"
          echo "$VERSION" > VERSION

          mkdir -p releases
          tar czf "releases/${PACKAGE}.tar.gz" \
            bin/ docs/ install.sh README.md
          cd releases
          sha256sum "${PACKAGE}.tar.gz" > "${PACKAGE}.tar.gz.sha256"

          echo "Package: releases/${PACKAGE}.tar.gz"
          ls -lh "${PACKAGE}.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: TRI-PI ${{ env.VERSION }} ARM64
          body: |
            Automatically built from [triangles_v5 ${{ env.VERSION }}](https://github.com/SamiAhmed7777/triangles_v5/releases/tag/${{ env.VERSION }})

            ## Installation

            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/tri-pi-${{ env.VERSION }}-arm64.tar.gz
            tar xzf tri-pi-${{ env.VERSION }}-arm64.tar.gz
            sudo ./install.sh
            ```

            Built for: Raspberry Pi 4/5 (64-bit), ARM64 servers
          files: |
            releases/tri-pi-${{ env.VERSION }}-arm64.tar.gz
            releases/tri-pi-${{ env.VERSION }}-arm64.tar.gz.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Create Tracking Issue
    needs: [resolve-version, build-arm64]
    if: needs.resolve-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Create issue for new build
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.resolve-version.outputs.version }}';
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `New upstream release built: ${version}`,
              body: `ARM64 build completed for triangles_v5 ${version}\n\nRelease: https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${version}\n\n---\n*Created automatically by CI.*`,
              labels: ['automated-build']
            })
