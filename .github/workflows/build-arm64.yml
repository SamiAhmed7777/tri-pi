name: Build TRI-PI ARM64

on:
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout tri-pi repo
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Get latest triangles version
        id: get-version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/SamiAhmed7777/triangles_v5/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "🔍 Building triangles $VERSION for ARM64"
      
      - name: Build ARM64 binary with Docker
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          
          docker buildx build \
            --platform linux/arm64 \
            --build-arg TRIANGLES_VERSION=$VERSION \
            -f .github/docker/Dockerfile.arm64 \
            -o type=docker \
            -t tri-pi:$VERSION \
            .
          
          # Extract binary from image
          docker run --rm \
            --platform linux/arm64 \
            -v $(pwd)/bin:/output \
            tri-pi:$VERSION \
            cp /usr/local/bin/trianglesd /output/
      
      - name: Create release package
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          PACKAGE_DIR="tri-pi-${VERSION}-arm64"
          
          chmod +x bin/trianglesd
          echo "$VERSION" > VERSION
          
          mkdir -p releases
          tar czf "releases/${PACKAGE_DIR}.tar.gz" \
            bin/ docs/ install.sh README.md scripts/ VERSION
          
          cd releases
          sha256sum "${PACKAGE_DIR}.tar.gz" > "${PACKAGE_DIR}.tar.gz.sha256"
          
          echo "📦 Package created:"
          ls -lh "${PACKAGE_DIR}.tar.gz"*
      
      - name: Commit and push changes
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          
          git config user.name "TRI-PI Builder"
          git config user.email "bot@tri-pi.build"
          
          git add bin/trianglesd VERSION releases/
          git commit -m "Auto-build: TRI-PI ${VERSION} ARM64 release

- Built from triangles_v5 ${VERSION}
- ARM64 binary via GitHub Actions QEMU
- Release package and checksums generated" || echo "No changes to commit"
          
          git push origin main || echo "Already up to date"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get-version.outputs.version }}
          name: TRI-PI ${{ steps.get-version.outputs.version }} ARM64
          body: |
            # TRI-PI ${{ steps.get-version.outputs.version }} ARM64
            
            ARM64 release built from [triangles_v5 ${{ steps.get-version.outputs.version }}](https://github.com/SamiAhmed7777/triangles_v5/releases/tag/${{ steps.get-version.outputs.version }})
            
            ## Installation
            
            ```bash
            wget https://github.com/SamiAhmed7777/tri-pi/releases/download/${{ steps.get-version.outputs.version }}/tri-pi-${{ steps.get-version.outputs.version }}-arm64.tar.gz
            tar xzf tri-pi-${{ steps.get-version.outputs.version }}-arm64.tar.gz
            cd tri-pi-*/
            sudo ./install.sh
            ```
            
            Built for: Raspberry Pi 4/5 (64-bit), ARM64 servers
          files: |
            releases/tri-pi-${{ steps.get-version.outputs.version }}-arm64.tar.gz
            releases/tri-pi-${{ steps.get-version.outputs.version }}-arm64.tar.gz.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
